<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nora – Dein Plan</title>
<style>
  :root{--acc:#2E6C8E;--ink:#1f2a33;--muted:#5a6b75;--line:#e2e8ed;--bg:#f7fafc;--red:#b23b3b;--redbg:#fdecec}
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;margin:0;background:var(--bg);color:var(--ink)}
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px 60px}
  h1{color:var(--acc);font-size:24px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 20px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:680px){.cols{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  h2{font-size:15px;margin:0 0 12px;display:flex;align-items:baseline;gap:8px}
  .cnt{color:var(--muted);font-weight:400;font-size:13px}
  .todo{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px}
  .todo.top{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
  .todo .t{font-weight:600;font-size:15px}
  .todo .m{font-size:13px;color:var(--muted);margin-top:2px}
  .pill{display:inline-block;font-size:12px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .pill.over{background:var(--redbg);color:var(--red)}
  .pill.top{background:#e4eef3;color:var(--acc)}
  .day{margin-bottom:14px}
  .day h3{font-size:13px;color:var(--muted);margin:0 0 4px;font-weight:600}
  .ev{display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
  .ev .time{font-size:13px;color:var(--acc);font-weight:600;min-width:56px}
  .ev .name{font-size:14px}
  .empty{color:var(--muted);font-size:14px;padding:8px 0}
  .err{background:var(--redbg);color:var(--red);padding:12px;border-radius:10px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Nora – Dein Plan</h1>
  <p class="sub" id="sub">Lädt…</p>
  <div class="cols">
    <div class="card">
      <h2>Aufgaben <span class="cnt" id="tcnt"></span></h2>
      <div id="todos"></div>
    </div>
    <div class="card">
      <h2>Diese Woche <span class="cnt" id="ccnt"></span></h2>
      <div id="cal"></div>
    </div>
  </div>
</div>
<script>
const FN='https://xytmbhbkridbepeyhfml.supabase.co/functions/v1/eb-plan';
const t=(new URLSearchParams(location.search)).get('t')||'';
const de=(s)=> s? new Date(s):null;
const fmtDate=(d)=> d? d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : '—';
const dayName=(d)=> d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
const fmtTime=(d)=> d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
function esc(s){ const e=document.createElement('div'); e.textContent=s==null?'':String(s); return e.innerHTML; }
async function load(){
  const sub=document.getElementById('sub');
  if(!t){ sub.innerHTML='<span class="err">Kein Zugriffs-Link. Bitte den persönlichen Link von Jarne verwenden.</span>'; return; }
  let j;
  try{ const r=await fetch(FN+'?t='+encodeURIComponent(t)); j=await r.json(); if(j.error) throw new Error(j.error); }
  catch(e){ sub.innerHTML='<span class="err">Konnte nicht laden ('+esc(e.message)+').</span>'; return; }
  sub.textContent='Stand '+(new Date()).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' · ein Ding nach dem anderen';
  const todos=j.todos||[];
  document.getElementById('tcnt').textContent=todos.length+' offen';
  const tc=document.getElementById('todos');
  tc.innerHTML = !todos.length ? '<div class="empty">Nichts offen. Stark.</div>' : todos.map((x,i)=>{
    const due=de(x.due);
    const pills=(i===0?'<span class="pill top">Jetzt dran</span>':'')+(x.overdue?'<span class="pill over">überfällig</span>':'');
    return '<div class="todo'+(i===0?' top':'')+'"><div class="t">'+esc(x.title)+pills+'</div>'
      +'<div class="m">'+esc(x.project||'')+'</div>'
      +'<div class="m">Frist '+fmtDate(due)+(x.amount?(' · '+x.amount+' €'):'')+'</div></div>';
  }).join('');
  const cc=document.getElementById('cal');
  if(!j.calendar_ok){ cc.innerHTML='<div class="empty">Kalender nicht verbunden.</div>'; return; }
  const evs=(j.calendar||[]).map(e=>({t:e.title,allDay:e.allDay,s:de(e.start)})).filter(e=>e.s).sort((a,b)=>a.s-b.s);
  document.getElementById('ccnt').textContent=evs.length+' Termine';
  if(!evs.length){ cc.innerHTML='<div class="empty">Diese Woche keine Termine.</div>'; return; }
  const groups={};
  evs.forEach(e=>{ const k=e.s.toISOString().slice(0,10); (groups[k]=groups[k]||[]).push(e); });
  cc.innerHTML=Object.keys(groups).sort().map(k=>{
    const d=new Date(k+'T00:00:00');
    const items=groups[k].map(e=>'<div class="ev"><div class="time">'+(e.allDay?'ganztg.':fmtTime(e.s))+'</div><div class="name">'+esc(e.t)+'</div></div>').join('');
    return '<div class="day"><h3>'+dayName(d)+'</h3>'+items+'</div>';
  }).join('');
}
load();
</script>
</body>
</html>
